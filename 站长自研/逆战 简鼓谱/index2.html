    <style>.section_line

        {

        <script>
            //4分音符
            var feng2 = document.getElementsByClassName("feng2")
            var feng4 = document.getElementsByClassName("feng4")
            var feng8 = document.getElementsByClassName("feng8")
            // 处理表格对齐问题
            for(var i=0;i<feng4.length;i++)
            {
                feng4.colspan = 16/4
            }
            for(var i=0;i<feng2.length;i++)
            {
                feng2.colspan = 16/2
            }
            for(var i=0;i<feng8.length;i++)
            {
                feng8.colspan = 16/8
            }
        </script>
</head>
<body>
    <h2>以最小单位为16分音符对齐，每一个格子表示1个16分音符</h2>
    鼓手第一小节，从旋律第五小节开始对拍，(等5*4=20个四分音符）
