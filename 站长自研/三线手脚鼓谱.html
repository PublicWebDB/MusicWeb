<body>
    <h2>总定义</h2>
    <p>绘制三条线，把所有要敲击的音符都画在线上，最底下的那个先叫做脚线（用来敲击底鼓用的），上面的两个线合称双手线，实际敲击时左右交换没关系，按鼓手的习惯自己调整</p>
    <p>除了底鼓（kick）以外的所有音符应该画在手脚线上</p>

    <h2>图例</h2>
    <img src="三线手脚谱1.png" alt="" srcset="">
    
   
    
    <h2>中文版定义</h2>
    <b>注：按照五鼓四擦来定义</b>
    <img src="三线手脚谱2.png" alt="" srcset="">
    <h2>英文版定义（只需要交换提示词语，符号不变）</h2>

</body>
</html>
